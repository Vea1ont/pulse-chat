networks:
  pulse:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  glitchtip_data:
  grafana_data:
  prometheus_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pulse
    healthcheck:  # С помощью healthcheck можно убедиться, что контейнер с PostgreSQL готов к работе перед запуском других сервисов, которые зависят от него.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] # Это команда проверяет, готов ли PostgreSQL принимать соединения.
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:7-alpine
    container_name: pulse_valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    networks:
      - pulse 
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pulse_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - pulse
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pulse_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pulse

  grafana:
    image: grafana/grafana:11.0.0
    container_name: pulse_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - pulse

  glitchtip:
    image: glitchtip/glitchtip
    container_name: pulse_glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://valkey:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
      DEFAULT_FROM_EMAIL: "glitchtip@localhost"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - glitchtip_data:/code/uploads
    networks:
      - pulse

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: pulse_glitchtip_worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://valkey:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - pulse

  glitchtip-migrate:
    image: glitchtip/glitchtip
    container_name: pulse_glitchtip_migrate
    command: ./bin/run-migrate.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://valkey:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pulse

  auth:
    build: ./services/auth
    container_name: pulse_auth
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - ./services/auth:/app
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - pulse
  chat:
    build: ./services/chat
    container_name: pulse_chat
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN}

    ports:
      - "8002:8000"
    depends_on: # чат не стартует пока не готова база данных, кэш и очередь сообщений
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulse
  notify:
    build: ./services/notify
    container_name: pulse_notify
    restart: unless-stopped
    environment:
      VALKEY_URL: ${VALKEY_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN}

    ports:
      - "8003:8000"
    depends_on:
      valkey:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulse