version: "3.9"

# Общая сеть — все контейнеры видят друг друга по имени сервиса.
# Например, из auth-сервиса можно написать postgres:5432, и это сработает.
networks:
  pulse:
    driver: bridge

# Именованные тома — Docker хранит данные на диске хоста.
# Без этого все данные Postgres/Grafana/Glitchtip удалятся при `docker compose down`.
volumes:
  postgres_data:
  valkey_data:
  grafana_data:
  glitchtip_data:
  prometheus_data:

services:

  # ──────────────────────────────────────────────
  # POSTGRES — основная реляционная БД
  # Хранит пользователей, чаты, сообщения
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine        # официальный образ, alpine = меньше весит
    container_name: pulse_postgres
    restart: unless-stopped          # перезапускается автоматически, если упал; стоп вручную — не перезапускается
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # данные БД → именованный том
    ports:
      - "5432:5432"                  # хост:контейнер — чтобы подключаться из DBeaver/psql с компьютера
    networks:
      - pulse
    healthcheck:                     # Docker проверяет: БД готова принимать запросы?
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s                  # проверять каждые 10 секунд
      timeout: 5s                    # ждать ответа не дольше 5 секунд
      retries: 5                     # после 5 провалов — контейнер считается unhealthy

  # ──────────────────────────────────────────────
  # VALKEY — кэш и хранилище онлайн-статусов
  # Open-source форк Redis 7. API совместим с Redis.
  # Здесь будем хранить: участников чата, сессии, счётчики непрочитанных
  # ──────────────────────────────────────────────
  valkey:
    image: valkey/valkey:7-alpine
    container_name: pulse_valkey
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    # --save 60 1  → сбрасывать данные на диск если за 60 сек изменилась хоть 1 запись
    # --loglevel warning → не засорять логи отладочными сообщениями
    volumes:
      - valkey_data:/data            # RDB-снимки сохраняются в том
    ports:
      - "6379:6379"                  # стандартный Redis-порт; нужен только для отладки с хоста
    networks:
      - pulse
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]   # должен ответить PONG
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # KAFKA — брокер сообщений
  # Когда приходит сообщение в chat-сервис, он публикует событие new_message в Kafka.
  # notify-сервис читает это событие и доставляет адресату через WebSocket/APNs.
  # Используем KRaft-режим — без ZooKeeper, Kafka сама управляет своим состоянием.
  # ──────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: pulse_kafka
    restart: unless-stopped
    environment:
      # KRaft — встроенный менеджер кластера, заменяет ZooKeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller          # одна нода играет обе роли
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093    # кворум из одной ноды (dev-режим)

      # Адреса, на которых Kafka слушает входящие соединения
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # kafka:9092 — имя сервиса в сети pulse; другие контейнеры будут подключаться именно так

      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Топики создаются автоматически при первой публикации — удобно для разработки
    ports:
      - "9092:9092"                  # для подключения из хоста (например, из kafka-ui или скрипта)
    networks:
      - pulse
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s              # дать Kafka 30 сек на инициализацию перед первой проверкой

  # ──────────────────────────────────────────────
  # PROMETHEUS — сбор метрик
  # Каждые 15 секунд опрашивает /metrics у всех сервисов
  # и складывает временны́е ряды в свою БД
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pulse_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"   # хранить метрики 7 дней
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus   # данные (временны́е ряды) переживают перезапуск
      # :ro — read-only; Prometheus читает конфиг, но не может его изменить
    ports:
      - "9090:9090"                  # веб-интерфейс Prometheus
    networks:
      - pulse

  # ──────────────────────────────────────────────
  # GRAFANA — визуализация метрик
  # Подключается к Prometheus как к datasource
  # и рисует дашборды: RPS, latency, ошибки, очередь Kafka
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: pulse_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"          # запретить самостоятельную регистрацию
      GF_FEATURE_TOGGLES_ENABLE: ""
    volumes:
      - grafana_data:/var/lib/grafana          # сохраняет дашборды и настройки
    ports:
      - "3000:3000"                            # открываешь localhost:3000 → видишь Grafana
    depends_on:
      - prometheus                             # стартовать после Prometheus
    networks:
      - pulse

  # ──────────────────────────────────────────────
  # GLITCHTIP — отслеживание ошибок (аналог Sentry)
  # Когда в коде вылетает необработанное исключение,
  # SDK отправляет стектрейс сюда. Ты видишь ошибку в веб-интерфейсе.
  # ──────────────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:v4
    container_name: pulse_glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Glitchtip использует ту же Postgres, но свои таблицы (Django ORM создаст их сам)
      REDIS_URL: redis://valkey:6379/1
      # /1 — отдельная БД внутри Valkey, чтобы не мешаться с кэшем приложения
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
      DEFAULT_FROM_EMAIL: "glitchtip@localhost"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      # console backend → письма печатаются в логи контейнера, не нужен SMTP для разработки
    ports:
      - "8010:8000"                  # localhost:8010 → веб-интерфейс Glitchtip
    depends_on:
      postgres:
        condition: service_healthy   # ждать пока Postgres пройдёт healthcheck
      valkey:
        condition: service_healthy
    volumes:
      - glitchtip_data:/code/uploads
    networks:
      - pulse

  # ──────────────────────────────────────────────
  # FASTAPI СЕРВИСЫ — три пустых заглушки
  # Сейчас каждый просто отвечает на /health.
  # Позже будем наращивать логику внутри каждого.
  # ──────────────────────────────────────────────

  auth:
    build: ./services/auth           # собрать образ из папки services/auth (там Dockerfile)
    container_name: pulse_auth
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL}
    ports:
      - "8001:8000"                  # localhost:8001 → auth сервис
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - pulse

  chat:
    build: ./services/chat
    container_name: pulse_chat
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "8002:8000"                  # localhost:8002 → chat сервис
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulse

  notify:
    build: ./services/notify
    container_name: pulse_notify
    restart: unless-stopped
    environment:
      VALKEY_URL: ${VALKEY_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "8003:8000"                  # localhost:8003 → notify сервис (WebSocket и пуши)
    depends_on:
      valkey:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulse
